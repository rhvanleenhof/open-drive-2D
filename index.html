<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Drive</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="view-home">
  <nav id="nav">
    <span class="nav-brand">Open Drive</span>
    <div class="nav-links">
      <a href="#" id="nav-home" class="nav-link active">Home</a>
      <a href="#" id="nav-play" class="nav-link">Play</a>
    </div>
  </nav>

  <div id="home-preview-wrap" aria-hidden="true">
    <canvas id="home-preview"></canvas>
  </div>

  <main id="home">
    <div class="home-content">
      <div class="home-hero">
        <p class="home-eyebrow">Top-down getaway driving</p>
        <h1 class="home-title">Open<br>Drive</h1>
        <p class="home-tagline">
          Cruise a procedurally generated city, pick up wanted fares,
          and deliver them across town — without letting the cops pin you down.
        </p>
        <button type="button" id="home-play" class="home-cta">Start driving</button>
      </div>
    </div>
  </main>

  <canvas id="game" hidden></canvas>

  <div id="hud" hidden>
    <canvas id="minimap" width="176" height="176"></canvas>

    <div id="jobs"><span class="label">JOBS</span><span id="jobs-count">0</span></div>

    <div id="banner">
      <div id="banner-title"></div>
      <div id="banner-sub"></div>
    </div>

    <div id="busted">
      <div class="label">GETTING PINNED!</div>
      <div class="bar"><div id="busted-fill"></div></div>
    </div>

    <div id="damage">
      <span class="label">CAR</span>
      <div class="bar"><div id="damage-fill"></div></div>
    </div>

    <div id="speedo">
      <span id="speed-value">0</span>
      <span class="unit">km/h</span>
    </div>

    <div id="hint">
      <div class="hint-row"><kbd>W</kbd><kbd>&uarr;</kbd><span>accelerate</span></div>
      <div class="hint-row"><kbd>S</kbd><kbd>&darr;</kbd><span>brake / reverse</span></div>
      <div class="hint-row"><kbd>A</kbd><kbd>D</kbd><span>steer</span></div>
      <div class="hint-row"><kbd>Space</kbd><span>handbrake</span></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
